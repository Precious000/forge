engine:
  host: "0.0.0.0"
  port: 8000
  max_concurrent_jobs: 4
  default_job_timeout: 1800  # 30 minutes in seconds
  workspace_base: "/tmp/forge-workspaces"
  log_dir: "/data/logs"

registry:
  host: "0.0.0.0"
  port: 8001
  storage_dir: "/data/artifacts"
  db_path: "/data/db/registry.db"

slack:
  webhook_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
  notify_users: ["@devops-team"]

auth:
  token_db_path: "/data/db/tokens.db"
